<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — DeviceWatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head><body>
<nav>
  <a href="../index.html" class="logo"><div class="logo-dot"></div>DeviceWatch</a>
  <div class="nav-links"><a href="../index.html">Search</a><a href="../about.html">About</a><a href="login.html">Sign In</a><a href="signup.html" class="btn-nav">Register Free →</a></div>
  <button class="hamburger" onclick="DW.toggleMenu()"><span></span><span></span><span></span></button>
</nav>
<div class="wrap">
  <div class="form-card">
    <h2>Create your <span style="color:var(--accent)">account</span></h2>
    <p class="lead">Register to report stolen devices and manage your listings. Free forever.</p>
    <form id="signup-form">
      <div class="form-group"><label>Full Name</label><input type="text" id="s-name" placeholder="As on National ID" required><div class="form-error" id="e-name"></div></div>
      <div class="form-group"><label>National ID Number</label><input type="text" id="s-nid" placeholder="e.g. MW1234567890" maxlength="20" required><div class="form-error" id="e-nid"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input type="email" id="s-email" placeholder="you@example.com" required><div class="form-error" id="e-email"></div></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="s-phone" placeholder="+265 ..." required></div>
      </div>
      <div class="form-group"><label>Password</label><input type="password" id="s-pass" placeholder="Minimum 8 characters" minlength="8" required><div class="form-error" id="e-pass"></div></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="s-pass2" placeholder="Repeat password" required><div class="form-error" id="e-pass2"></div></div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>
    <p class="form-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>
<footer><a href="../index.html" class="logo"><div class="logo-dot"></div>DeviceWatch</a><p>&copy; 2026 DeviceWatch — TechNexus Malawi</p></footer>
<script src="../js/app.js"></script>
<script>
document.getElementById('signup-form').addEventListener('submit', e => {
  e.preventDefault();
  document.querySelectorAll('.form-error').forEach(el => { el.classList.remove('show'); el.textContent = ''; });
  const name = document.getElementById('s-name').value.trim();
  const nid = document.getElementById('s-nid').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const phone = document.getElementById('s-phone').value.trim();
  const pass = document.getElementById('s-pass').value;
  const pass2 = document.getElementById('s-pass2').value;
  let valid = true;
  function err(id, msg) { document.getElementById(id).textContent = msg; document.getElementById(id).classList.add('show'); valid = false; }
  if (name.length < 3) err('e-name', 'Name must be at least 3 characters');
  if (!/^[A-Za-z0-9]{6,20}$/.test(nid)) err('e-nid', 'National ID: 6-20 alphanumeric characters');
  if (pass.length < 8) err('e-pass', 'Minimum 8 characters');
  if (pass !== pass2) err('e-pass2', 'Passwords do not match');
  if (!valid) return;
  const result = DW.signup({ name, nid, email, phone, password: pass });
  if (!result.success) { err('e-email', result.error); return; }
  DW.toast('Account created. Redirecting...', 'success');
  setTimeout(() => { window.location.href = '../dashboard.html'; }, 1200);
});
</script>
</body></html>

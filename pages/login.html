<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to DeviceWatch to manage your registered devices and stolen device reports.">
  <meta name="page-depth" content="../">
  <title>Sign In — DeviceWatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

  <nav>
    <a href="../index.html" class="logo"><div class="logo-dot"></div>DeviceWatch</a>
    <div class="nav-links">
      <a href="../index.html">Search</a>
      <a href="../about.html">About</a>
      <a href="signup.html" class="btn-nav">Register Free</a>
    </div>
    <button class="hamburger" onclick="DW.toggleMenu()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-tag">// Sign In</div>
      <h1 class="auth-title">Welcome back.</h1>
      <p class="auth-sub">Sign in to manage your registered devices and reports.</p>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="pass">Password</label>
        <input type="password" id="pass" placeholder="Your password" autocomplete="current-password">
      </div>
      <a href="#" class="forgot">Forgot password?</a>
      <button class="submit-btn" id="loginBtn">SIGN IN</button>

      <div class="divider">or</div>
      <div class="auth-alt">No account? <a href="signup.html">Register free</a></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="../js/app.js"></script>
  <script>
    function doLogin() {
      const e = document.getElementById('email').value.trim();
      const p = document.getElementById('pass').value;
      if (!e || !p) {
        DW.toast('Please enter your email and password', 'error');
        return;
      }
      if (!e.includes('@')) {
        DW.toast('Please enter a valid email address', 'error');
        return;
      }
      DW.login(e);
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
